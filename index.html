<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        /* 60% Dominant: Soft Off-White Background */
        body {
            background-color: #F7F0E5;
            color: #13274F;
        }
        .container {
            height: 100vh;
            width: 87vw;
            margin: 0 auto;
        }
        /* 30% Secondary: Deep Navy Blue for headers & primary typography */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 0;
            border-bottom: 2px solid #13274F;
            margin-bottom: 2rem;
        }
        .header h1 {
            color: #13274F;
            font-size: 2.5rem;
        }
        /* 10% Accent: Crimson Red for important action buttons */
        button {
            padding: 0.6rem 1.2rem;
            border-radius: 5px;
            background-color: #CE1141;
            color: #FFFFFF;
            cursor: pointer;
            border: none;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }
        button:hover {
            background-color: #A00D32;
        }
        /* Secondary action styling for cancel button */
        #cancelBtn {
            background-color: transparent;
            color: #13274F;
            border: 1px solid #13274F;
        }
        #cancelBtn:hover {
            background-color: rgba(19, 39, 79, 0.1);
        }
        .bookList {
            padding: 1rem 0;
        }
        /* Dialog Box Styling matching the Navy theme */
        dialog {
            border: none;
            border-radius: 8px;
            padding: 30px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(19, 39, 79, 0.2);
            margin: auto;
            background-color: #FFFFFF;
            color: #13274F;
        }
        dialog h2 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            border-bottom: 1px solid #E5DCCB;
            padding-bottom: 0.5rem;
        }
        dialog::backdrop {
            background: rgba(19, 39, 79, 0.5);
        }
        #bookForm {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .form-group input {
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #13274F;
            border-radius: 4px;
            background-color: #F7F0E5;
            color: #13274F;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            margin: 5px 0;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 10px;
        }
        /* Grid Layout & Table Typography styling */
        .headings {
            display: grid;
            grid-template-columns: 2fr 2fr 1fr 1fr 1fr 1fr;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #13274F;
        }
        .headings h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card {
            display: grid;
            grid-template-columns: 2fr 2fr 1fr 1fr 1fr 1fr;
            padding: 1rem 0.5rem;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(19, 39, 79, 0.1);
        }
        /* Explicit visual markers for book progress states */
        .is-read {
            background-color: rgba(26, 115, 232, 0.1);
            color: #13274F;
            font-weight: bold;
        }
        .not-read {
            background-color: rgba(206, 17, 65, 0.1);
            color: #CE1141;
            font-weight: bold;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <div>
            <div class="header">
                <h1>Library</h1>
                <button id="newBook">Add new Book</button>
            </div>

            <dialog id="bookDialog">
                <h2>Library : Add new Book</h2>
                
                <form id="bookForm" method="dialog"> 
                    <div class="form-group">
                        <label for="title">Book Title</label>
                        <input type="text" id="title" required>
                    </div>

                    <div class="form-group">
                        <label for="author">Book Author</label>
                        <input type="text" id="author" required>
                    </div>

                    <div class="form-group">
                        <label for="pages">Pages</label>
                        <input type="number" id="pages" required>
                    </div>

                    <div class="radio-group">
                        <label><input type="radio" name="readStatus" value="Read"> Read</label>
                        <label><input type="radio" name="readStatus" value="Not Read"> Not Read</label>
                    </div>

                    <div class="form-actions">
                    
                    <button type="submit" id="submitBookBtn">Add Book</button>
                    <button type="button" id="cancelBtn">Cancel</button>
                    </div>
                </form>
            </dialog>
        </div>

        <div class="books">
            <div class="headings">
                <h2>Book Title</h2>
                <h2>Author</h2>
                <h2>Pages</h2>
                <h2>Read</h2>
            </div>
            <div class="bookList">

            </div>
        </div>
    </div>

    <script src="library.js"></script>
</body>
</html>
